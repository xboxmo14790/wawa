<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KakaoMap - 검색 및 카테고리</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a}
#map{position:absolute;inset:0}

/* 검색 패널 스타일 */
#panel{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:min(92%,420px);z-index:10;display:flex;flex-direction:column;gap:6px}
#search-wrap{display:flex;gap:6px;background:#fff;border-radius:10px;padding:8px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
#q{flex:1;border:1px solid #e0e0e0;border-radius:7px;padding:9px 12px;font-size:14px;outline:none;transition:border-color .2s}
#q:focus{border-color:#3c8bff}
#btn{padding:9px 16px;background:#FEE500;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
#btn:disabled{background:#ccc;cursor:not-allowed}
#list{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.15);overflow-y:auto;max-height:220px;display:none}
.item{padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.item:last-child{border-bottom:none}
.item:hover{background:#f7f7f7}
.name{font-weight:600;color:#111;line-height:1.3}
.addr{font-size:12px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{padding:166px;text-align:center;color:#aaa;font-size:13px}
#toast{position:absolute;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.75);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:20}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 카테고리 메뉴 스타일 */
#category {position:absolute;top:12px;left:12px;z-index:10;border-radius:5px;border:1px solid #919191;box-shadow:0 1px 1px rgba(0,0,0,0.4);background:#fff;overflow:hidden;padding:0;margin:0;list-style:none;}
#category li {float:left;width:50px;height:52px;border-right:1px solid #acacac;padding:7px 0;text-align:center;cursor:pointer;}
#category li:last-child {border-right:none;}
#category li.on {background:#eee;}
#category li span {display:block;margin:0 auto 3px;width:27px;height:28px;background:url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/places_category.png') no-repeat;}
#category li .bank {background-position:-10px 0;}
#category li .mart {background-position:-10px -36px;}
#category li .pharmacy {background-position:-10px -72px;}
#category li .oil {background-position:-10px -108px;}
#category li .cafe {background-position:-10px -144px;}
#category li .store {background-position:-10px -180px;}

/* 카테고리용 커스텀 오버레이 말풍선 스타일 */
.placeinfo_wrap {position:absolute;bottom:28px;left:-150px;width:300px;}
.placeinfo {position:relative;width:100%;border-radius:6px;border: 1px solid #ccc;border-bottom:2px solid #ddd;background:#fff;padding:10px;}
.placeinfo:nth-child(1) {padding:0 0 10px 0;}
.placeinfo a, .placeinfo a:hover, .placeinfo a:active{color:#fff;text-decoration:none;background:#ff4d4d;padding:8px 10px;display:block;border-radius:6px 6px 0 0;font-weight:bold;}
.placeinfo span {display:block;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;font-size:12px;padding:4px 10px 0;}
.placeinfo .jibun {color:#999;}
.placeinfo .tel {color:#009933;font-weight:bold;}
.placeinfo_wrap .after {content:'';position:absolute;margin-left:-12px;left:50%;bottom:-12px;width:22px;height:12px;background:url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/vertex_white.png')}
</style>
</head>
