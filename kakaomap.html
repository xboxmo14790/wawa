<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KakaoMap - 검색 및 카테고리</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a}
#map{position:absolute;inset:0}

/* 검색 패널 스타일 */
#panel{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:min(92%,420px);z-index:10;display:flex;flex-direction:column;gap:6px}
#search-wrap{display:flex;gap:6px;background:#fff;border-radius:10px;padding:8px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
#q{flex:1;border:1px solid #e0e0e0;border-radius:7px;padding:9px 12px;font-size:14px;outline:none;transition:border-color .2s}
#q:focus{border-color:#3c8bff}
#btn{padding:9px 16px;background:#FEE500;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
#btn:disabled{background:#ccc;cursor:not-allowed}
#list{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.15);overflow-y:auto;max-height:220px;display:none}
.item{padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.item:last-child{border-bottom:none}
.item:hover{background:#f7f7f7}
.name{font-weight:600;color:#111;line-height:1.3}
.addr{font-size:12px;color:#888;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{padding:166px;text-align:center;color:#aaa;font-size:13px}
#toast{position:absolute;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.75);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:20}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 카테고리 메뉴 스타일 */
#category {position:absolute;top:12px;left:12px;z-index:10;border-radius:5px;border:1px solid #919191;box-shadow:0 1px 1px rgba(0,0,0,0.4);background:#fff;overflow:hidden;padding:0;margin:0;list-style:none;}
#category li {float:left;width:50px;height:52px;border-right:1px solid #acacac;padding:7px 0;text-align:center;cursor:pointer;}
#category li:last-child {border-right:none;}
#category li.on {background:#eee;}
#category li span {display:block;margin:0 auto 3px;width:27px;height:28px;background:url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/places_category.png') no-repeat;}
#category li .bank {background-position:-10px 0;}
#category li .mart {background-position:-10px -36px;}
#category li .pharmacy {background-position:-10px -72px;}
#category li .oil {background-position:-10px -108px;}
#category li .cafe {background-position:-10px -144px;}
#category li .store {background-position:-10px -180px;}

/* 카테고리용 커스텀 오버레이 말풍선 스타일 */
.placeinfo_wrap {position:absolute;bottom:28px;left:-150px;width:300px;}
.placeinfo {position:relative;width:100%;border-radius:6px;border: 1px solid #ccc;border-bottom:2px solid #ddd;background:#fff;padding:10px;}
.placeinfo:nth-child(1) {padding:0 0 10px 0;}
.placeinfo a, .placeinfo a:hover, .placeinfo a:active{color:#fff;text-decoration:none;background:#ff4d4d;padding:8px 10px;display:block;border-radius:6px 6px 0 0;font-weight:bold;}
.placeinfo span {display:block;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;font-size:12px;padding:4px 10px 0;}
.placeinfo .jibun {color:#999;}
.placeinfo .tel {color:#009933;font-weight:bold;}
.placeinfo_wrap .after {content:'';position:absolute;margin-left:-12px;left:50%;bottom:-12px;width:22px;height:12px;background:url('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/vertex_white.png')}
</style>
</head>
<body>

<ul id="category">
  <li id="BK9" data-order="0"><span class="bank"></span>은행</li>
  <li id="MT1" data-order="1"><span class="mart"></span>마트</li>
  <li id="PM9" data-order="2"><span class="pharmacy"></span>약국</li>
  <li id="OL7" data-order="3"><span class="oil"></span>주유소</li>
  <li id="CE7" data-order="4"><span class="cafe"></span>카페</li>
  <li id="CS2" data-order="5"><span class="store"></span>편의점</li>
</ul>

<div id="map"></div>
<div id="panel">
  <div id="search-wrap">
    <input id="q" type="search" placeholder="장소, 주소 검색" autocomplete="off" enterkeyhint="search">
    <button id="btn">검색</button>
  </div>
  <div id="list"></div>
</div>
<div id="toast"></div>

<script>
const JS_KEY = 'de211e1826407558332dcbf72b0a4aee';

let map, ps, infowindow;
let markers = []; // 키워드 검색용 마커 배열
let categoryMarkers = []; // 카테고리 검색용 마커 배열
let currCategory = ''; // 현재 선택된 카테고리 코드

// 카테고리용 커스텀 오버레이 선언
const placeOverlay = new kakao.maps.CustomOverlay({ zIndex: 1 });
const contentNode = document.createElement('div');

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5,
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  
  // 중요: Places 객체 생성 시 map을 넘겨주어야 이펙트(이동할 때마다 재검색)가 정상 작동합니다.
  ps = new kakao.maps.services.Places(map); 
  infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

  // 지도 드래그/확대 축소 등이 끝났을 때(idle) 카테고리 재검색 이벤트 등록
  kakao.maps.event.addListener(map, 'idle', searchPlacesFromCategory);

  // 커스텀 오버레이 설정 및 이벤트 전파 방지
  contentNode.className = 'placeinfo_wrap';
  addEventHandle(contentNode, 'mousedown', kakao.maps.event.preventMap);
  addEventHandle(contentNode, 'touchstart', kakao.maps.event.preventMap);
  placeOverlay.setContent(contentNode);

  // 카테고리 클릭 이벤트 바인딩
  addCategoryClickEvent();
}

/* ================= [기능 1] 키워드 검색 기능 (기존 기능) ================= */
function search() {
  const keyword = document.getElementById('q').value.trim();
  if (!keyword) return;
  if (!ps) { showToast('지도 로딩 중입니다'); return; }
  
  // 키워드 검색 시 카테고리 선택 및 카테고리 마커 해제
  currCategory = '';
  changeCategoryClass();
  clearCategoryMarkers();
  placeOverlay.setMap(null);

  clearMarkers();
  document.getElementById('list').style.display = 'none';
  
  // 전국 혹은 맵 기준 기본 키워드 검색 수행
  ps.keywordSearch(keyword, handleResult);
}

function handleResult(data, status) {
  if (status === kakao.maps.services.Status.OK) {
    renderList(data);
  } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
    const list = document.getElementById('list');
    list.innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    list.style.display = 'block';
  } else {
    showToast('검색 중 오류가 발생했습니다');
  }
}

function renderList(places) {
  const list = document.getElementById('list');
  const bounds = new kakao.maps.LatLngBounds();
  const frag = document.createDocumentFragment();

  places.forEach((p, i) => {
    const latlng = new kakao.maps.LatLng(p.y, p.x);
    createKeywordMarker(p, i);
    bounds.extend(latlng);

    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `<div class="name">${p.place_name}</div><div class="addr">${p.road_address_name || p.address_name}</div>`;
    el.addEventListener('click', () => {
      map.setCenter(latlng);
      map.setLevel(3);
      kakao.maps.event.trigger(markers[i], 'click');
      list.style.display = 'none';
    });
    frag.appendChild(el);
  });

  list.innerHTML = '';
  list.appendChild(frag);
  list.style.display = 'block';
  map.setBounds(bounds, 50);
}

function createKeywordMarker(place, idx) {
  const pos = new kakao.maps.LatLng(place.y, place.x);
  const marker = new kakao.maps.Marker({ map, position: pos });
  kakao.maps.event.addListener(marker, 'click', () => {
    infowindow.setContent(`<div style="padding:6px 10px;font-size:13px;font-weight:600;max-width:180px">${place.place_name}</div>`);
    infowindow.open(map, marker);
  });
  markers.push(marker);
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (infowindow) infowindow.close();
}


/* ================= [기능 2] 카테고리 검색 기능 (추가 기능) ================= */
function searchPlacesFromCategory() {
  if (!currCategory) return;
  placeOverlay.setMap(null);
  clearCategoryMarkers();
  
  // 현재 보고 있는 지도 화면 안(useMapBounds: true)에서 카테고리 검색 수행
  ps.categorySearch(currCategory, categorySearchCB, { useMapBounds: true });
}

function categorySearchCB(data, status) {
  if (status === kakao.maps.services.Status.OK) {
    displayCategoryPlaces(data);
  }
}

function displayCategoryPlaces(places) {
  const order = document.getElementById(currCategory).getAttribute('data-order');

  places.forEach(place => {
    const marker = addCategoryMarker(new kakao.maps.LatLng(place.y, place.x), order);
    kakao.maps.event.addListener(marker, 'click', () => {
      displayPlaceInfo(place);
    });
  });
}

function addCategoryMarker(position, order) {
  const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/places_category.png';
  const imageSize = new kakao.maps.Size(27, 28);
  const imgOptions = {
    spriteSize: new kakao.maps.Size(72, 208),
    spriteOrigin: new kakao.maps.Point(46, (order * 36)),
    offset: new kakao.maps.Point(11, 28)
  };
  const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imgOptions);
  const marker = new kakao.maps.Marker({ position, image: markerImage });
  
  marker.setMap(map);
  categoryMarkers.push(marker);
  return marker;
}

function clearCategoryMarkers() {
  categoryMarkers.forEach(m => m.setMap(null));
  categoryMarkers = [];
}

function displayPlaceInfo(place) {
  let content = `<div class="placeinfo">
                  <a class="title" href="${place.place_url}" target="_blank" title="${place.place_name}">${place.place_name}</a>`;
  if (place.road_address_name) {
    content += `  <span title="${place.road_address_name}">${place.road_address_name}</span>
                  <span class="jibun" title="${place.address_name}">(지번 : ${place.address_name})</span>`;
  } else {
    content += `  <span title="${place.address_name}">${place.address_name}</span>`;
  }
  content += `    <span class="tel">${place.phone || '전화번호 없음'}</span>
                </div>
                <div class="after"></div>`;

  contentNode.innerHTML = content;
  placeOverlay.setPosition(new kakao.maps.LatLng(place.y, place.x));
  placeOverlay.setMap(map);
}

function addCategoryClickEvent() {
  const category = document.getElementById('category');
  const children = category.children;
  for (let i = 0; i < children.length; i++) {
    children[i].onclick = onClickCategory;
  }
}

function onClickCategory() {
  const id = this.id;
  const className = this.className;

  placeOverlay.setMap(null);

  // 기존 키워드 검색 결과 삭제 및 숨김 처리
  clearMarkers();
  document.getElementById('list').style.display = 'none';

  if (className === 'on') {
    currCategory = '';
    changeCategoryClass();
    clearCategoryMarkers();
  } else {
    currCategory = id;
    changeCategoryClass(this);
    searchPlacesFromCategory();
  }
}

function changeCategoryClass(el) {
  const category = document.getElementById('category');
  const children = category.children;
  for (let i = 0; i < children.length; i++) {
    children[i].className = '';
  }
  if (el) el.className = 'on';
}

function addEventHandle(target, type, callback) {
  if (target.addEventListener) {
    target.addEventListener(type, callback);
  } else {
    target.attachEvent('on' + type, callback);
  }
}


/* ================= [기능 3] 유틸리티 기능 (토스트, 이벤트 청취 등) ================= */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('btn').addEventListener('click', search);
document.getElementById('q').addEventListener('keydown', e => e.key === 'Enter' && search());
document.addEventListener('click', e => {
  if (!e.target.closest('#panel') && !e.target.closest('#category')) {
    document.getElementById('list').style.display = 'none';
    if (infowindow) infowindow.close();
    placeOverlay.setMap(null);
  }
});

// 외부(App Inventor 등) 연동을 위한 함수 유지
window.AppInventor = {
  setWebViewString(str) {
    if (!str) return;
    document.getElementById('q').value = str;
    search();
  },
};

(function loadSDK() {
  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${JS_KEY}&libraries=services&autoload=false`;
  s.onload = () => kakao.maps.load(initMap);
  s.onerror = () => showToast('지도 SDK 로드 실패');
  document.head.appendChild(s);
})();
</script>
</body>
</html>
